{% extends "base.html" %}
{% block title %}Sign in — HDI Insight{% endblock %}

{% block content %}
<!-- Auth pages get their own narrow shell instead of the app-shell
     sidebar layout, since there's nothing to show a sidebar about yet. -->
<div class="auth-shell">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to run and review HDI predictions.</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <div class="auth-switch">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
